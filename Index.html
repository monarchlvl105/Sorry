<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Poppins', sans-serif;
        background: linear-gradient(135deg, #1a0026, #330033, #000000);
        color: rgb(255, 9, 9);
        text-align: center;
        transition: background 2s ease;
    }

    /* AFTER CLICK BACKGROUND */
    .love-mode {
        background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffd6e7);
    }

    .sorry {
        position: absolute;
        bottom: -50px;
        font-size: 20px;
        color: rgba(255, 91, 116, 0.801);
        animation: floatUp linear infinite;
        pointer-events: none;
    }

    @keyframes floatUp {
        from { transform: translateY(0); opacity: 1; }
        to { transform: translateY(-120vh); opacity: 0; }
    }

    .center {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 90%;
        max-width: 380px;
        z-index: 10;
    }

    .center img {
        width: 70vw;
        max-width: 260px;
        aspect-ratio: 1/1;
        object-fit: cover;
        border-radius: 20px;
        box-shadow: 0 0 25px rgba(255, 105, 180, 0.6);
    }

    .message {
        margin-top: 18px;
        font-size: clamp(16px, 4vw, 22px);
        background-color: white;
        border-radius: 25%;
        line-height: 1.6;
        color: #f787b6;
    }

    .btn {
        margin-top: 18px;
        padding: 12px 22px;
        font-size: clamp(14px, 4vw, 18px);
        border: none;
        border-radius: 30px;
        box-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
        background: #ff4d6d;
        color: white;
        cursor: pointer;
    }

    .hidden {
        display: none;
        margin-top: 15px;
        font-size: clamp(16px, 4vw, 22px);
        background-color: whitesmoke;
        border-radius: 10%;
        color: #ff6363;
        min-height: 60px;
    }

    .burst-heart {
        position: absolute;
        font-size: 20px;
        animation: explode 1s ease-out forwards;
        pointer-events: none;
    }

    @keyframes explode {
        from { transform: translate(0,0) scale(1); opacity: 1; }
        to { transform: translate(var(--x), var(--y)) scale(1.8); opacity: 0; }
    }
</style>
</head>
<body>


<div class="center">
    <img src="your-photo.jpg" alt="Us">

    <div class="message">
       Nanduuuuuu 🥺 I’m really sorry for everything...😖💔<br>
        Please forgive me 🥺
    </div>

    <button class="btn" onclick="forgive(event)">
        Okkkayyy Lastt Time ! 🙄
    </button>

    <!-- Typing text -->
    <div id="typingText" class="hidden"></div>
</div>

<script>
    function createSorry() {
        const text = document.createElement("div");
        text.className = "sorry";
        text.innerText = "Sorry";

        text.style.left = Math.random() * 100 + "vw";
        text.style.fontSize = (14 + Math.random() * 22) + "px";
        text.style.animationDuration = (4 + Math.random() * 5) + "s";

        document.body.appendChild(text);
        setTimeout(() => text.remove(), 9000);
    }
    setInterval(createSorry, 180);

    let isTyping = false; // global flag

function forgive(e) {

    if (isTyping) return; // 🚫 prevent double click spam
    isTyping = true;

    document.body.classList.add("love-mode");

    let box = document.getElementById("typingText");
    box.style.display = "block";
    box.innerHTML = ""; // reset text

    let text = "Beboooo I know I made mistakes... but losing you would be my biggest one 😖 , I promise Nanduuuuu 🥺 I'll grow, I'll listen, and I'll be better... for us 🥺❤️ ";
    let i = 0;

    function type() {
        if (i < text.length) {
            box.innerHTML += text.charAt(i);
            i++;
            setTimeout(type, 40);
        }
    }
    type();

    // 💥 hearts explosion (same as before)
    let xPos = e.touches ? e.touches[0].clientX : e.clientX;
    let yPos = e.touches ? e.touches[0].clientY : e.clientY;

    for (let i = 0; i < 30; i++) {
        let heart = document.createElement("div");
        heart.className = "burst-heart";
        heart.innerText = "❤️";

        let angle = Math.random() * 2 * Math.PI;
        let radius = 150 + Math.random() * 100;

        let x = Math.cos(angle) * radius + "px";
        let y = Math.sin(angle) * radius + "px";

        heart.style.setProperty('--x', x);
        heart.style.setProperty('--y', y);

        heart.style.left = xPos + "px";
        heart.style.top = yPos + "px";

        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }
}
</script>

</body>
</html>
